<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>행복해져라 얍~~~!!!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Gaegu', sans-serif;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #fce4ec 0%, #fff3e0 30%, #e8f5e9 60%, #e3f2fd 100%);
    overflow: hidden;
    padding: 20px;
  }

  .wrapper {
    text-align: center;
    animation: bounceIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes bounceIn {
    from { opacity: 0; transform: scale(0.3) rotate(-10deg); }
    50% { transform: scale(1.05) rotate(2deg); }
    to { opacity: 1; transform: scale(1) rotate(0); }
  }

  .face {
    font-size: 80px;
    margin-bottom: 10px;
    animation: wiggle 2s ease-in-out infinite;
    display: inline-block;
  }
  @keyframes wiggle {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(-10deg); }
    75% { transform: rotate(10deg); }
  }

  h1 {
    font-size: 36px;
    color: #e91e63;
    margin-bottom: 8px;
    text-shadow: 2px 2px 0 rgba(233, 30, 99, 0.15);
    line-height: 1.3;
  }

  .sub {
    font-size: 20px;
    color: #8e6a5a;
    margin-bottom: 30px;
  }

  .go-btn {
    display: inline-block;
    background: linear-gradient(135deg, #ff6b9d, #ff8a65);
    color: #fff;
    padding: 18px 40px;
    border-radius: 999px;
    font-family: 'Gaegu', sans-serif;
    font-size: 24px;
    font-weight: 700;
    text-decoration: none;
    border: none;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(255, 107, 157, 0.4);
    transition: transform 0.2s, box-shadow 0.2s;
    animation: pulse 2s ease-in-out infinite;
  }
  .go-btn:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 10px 30px rgba(255, 107, 157, 0.5);
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.03); }
  }

  .sparkles {
    position: fixed;
    pointer-events: none;
    z-index: 0;
  }
  .sparkle {
    position: fixed;
    font-size: 20px;
    animation: float linear infinite;
    opacity: 0.7;
  }
  @keyframes float {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.7; }
    90% { opacity: 0.7; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  .hearts {
    margin-top: 20px;
    font-size: 14px;
    color: #e091a8;
    letter-spacing: 4px;
  }
</style>
</head>
<body>

  <div class="wrapper">
    <div class="face">( *ˊᗜˋ* )</div>
    <h1>행복해져라 얍~~~!!!</h1>
    <p class="sub">누르면 좋은 일이 생겨요 ✨</p>
    <a href="https://influencers.coupang.com/s/dkanrjsk" class="go-btn">
      행복 받으러 가기 →
    </a>
    <div class="hearts">♥ ♥ ♥ ♥ ♥</div>
  </div>

  <script>
    var emojis = ['✨', '🌸', '💖', '🦋', '🍀', '⭐', '🌈', '🧸'];
    for (var i = 0; i < 15; i++) {
      var span = document.createElement('span');
      span.className = 'sparkle';
      span.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      span.style.left = Math.random() * 100 + 'vw';
      span.style.animationDuration = (4 + Math.random() * 6) + 's';
      span.style.animationDelay = (Math.random() * 5) + 's';
      span.style.fontSize = (14 + Math.random() * 16) + 'px';
      document.body.appendChild(span);
    }
  </script>

</body>
</html>
