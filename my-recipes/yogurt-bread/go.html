<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>요거트 식빵 비법재료</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #ffffff;
    color: #262626;
    line-height: 1.55;
    letter-spacing: -0.01em;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 18px;
  }

  .modal {
    background: #ffffff;
    border-radius: 16px;
    padding: 28px 22px 22px;
    max-width: 380px;
    width: 100%;
    text-align: center;
    box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.08), 0 4px 24px rgba(0, 0, 0, 0.06);
    animation: modalIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.92) translateY(12px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-icon { font-size: 36px; margin-bottom: 6px; }
  .modal-title {
    font-family: 'Gaegu', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: #262626;
    margin-bottom: 10px;
  }
  .modal-desc {
    font-size: 13.5px;
    color: #8e8e8e;
    margin-bottom: 16px;
    line-height: 1.6;
  }
  .modal-keyword {
    background: #fafafa;
    border: 1.5px dashed #dbdbdb;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .modal-keyword-label {
    font-size: 11px;
    color: #0095f6;
    font-weight: 700;
    letter-spacing: 0.06em;
    margin-bottom: 4px;
  }
  .modal-keyword-value {
    font-family: 'Gaegu', sans-serif;
    font-size: 24px;
    color: #262626;
    line-height: 1.3;
    font-weight: 700;
  }
  .modal-cta {
    display: block;
    width: 100%;
    background: #0095f6;
    color: #fff;
    padding: 13px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: 700;
    font-size: 15px;
    border: none;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  .modal-cta:hover { background: #1aa1f7; }
  .modal-subtext {
    font-size: 10.5px;
    color: #c7c7c7;
    margin-top: 6px;
  }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #262626;
    color: #fff;
    padding: 12px 20px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 2000;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

  <div class="modal">
    <div class="modal-icon">🍞</div>
    <div class="modal-title">여기서 바로 볼 수 있어요!</div>
    <p class="modal-desc">
      버튼 누르면 바로 이동돼요!<br>혹시 안 뜨면 검색창에 <strong>붙여넣기</strong> 해주세요<br>(키워드는 자동으로 복사돼요)
    </p>

    <div class="modal-keyword">
      <div class="modal-keyword-label">🔍 검색 키워드</div>
      <div class="modal-keyword-value">알티</div>
    </div>

    <a href="https://influencers.coupang.com/s/dkanrjsk#:~:text=%EC%95%84%EB%9E%98%20%EA%B2%80%EC%83%89%EC%B0%BD%EC%97%90%20%ED%82%A4%EC%9B%8C%EB%93%9C%EB%A5%BC%20%EC%9E%85%EB%A0%A5%ED%95%B4%EC%A3%BC%EC%84%B8%EC%9A%94!"
       class="modal-cta"
       id="goCoupangBtn"
       target="_blank"
       rel="noopener noreferrer">
      키워드 복사하고 바로가기 →
    </a>
    <p class="modal-subtext">쿠팡 파트너스 활동의 일환입니다</p>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const SEARCH_KEYWORD = '알티';

    document.getElementById('goCoupangBtn').addEventListener('click', function() {
      const btn = this;
      btn.textContent = '이동 중...';
      btn.style.opacity = '0.7';
      btn.style.pointerEvents = 'none';
      copyKeyword(SEARCH_KEYWORD);
    });

    function copyKeyword(keyword) {
      if (navigator.clipboard) {
        navigator.clipboard.writeText(keyword).then(() => {
          showToast('"' + keyword + '" 복사 완료! 쿠팡에서 붙여넣기 하세요');
        }).catch(() => fallbackCopyKeyword(keyword));
      } else {
        fallbackCopyKeyword(keyword);
      }
    }

    function fallbackCopyKeyword(text) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      try {
        document.execCommand('copy');
        showToast('"' + text + '" 복사 완료! 쿠팡에서 붙여넣기 하세요');
      } catch (e) {}
      document.body.removeChild(ta);
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }
  </script>

</body>
</html>
