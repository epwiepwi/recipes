<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ABC쥬스 추천</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #ffffff;
    color: #262626;
    line-height: 1.55;
    letter-spacing: -0.01em;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 18px;
  }

  .modal {
    background: #ffffff;
    border-radius: 16px;
    padding: 28px 22px 22px;
    max-width: 380px;
    width: 100%;
    text-align: center;
    box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.08), 0 4px 24px rgba(0, 0, 0, 0.06);
    animation: modalIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.92) translateY(12px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-icon { font-size: 36px; margin-bottom: 6px; }
  .modal-title {
    font-family: 'Gaegu', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: #262626;
    margin-bottom: 10px;
  }
  .modal-desc {
    font-size: 13.5px;
    color: #8e8e8e;
    margin-bottom: 16px;
    line-height: 1.6;
  }
  .modal-set {
    background: #f5f5f5;
    border: 1px solid #efefef;
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 10px;
  }
  .modal-set .modal-keyword-label {
    font-size: 11px;
    color: #0095f6;
    font-weight: 700;
    letter-spacing: 0.06em;
    margin-bottom: 4px;
  }
  .modal-set .modal-keyword-value {
    font-family: 'Gaegu', sans-serif;
    font-size: 22px;
    color: #262626;
    font-weight: 700;
    margin-bottom: 10px;
  }
  .modal-cta {
    display: block;
    width: 100%;
    background: #0095f6;
    color: #fff;
    padding: 13px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: 700;
    font-size: 15px;
    border: none;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  .modal-cta:hover { background: #1aa1f7; }
  .modal-cta.secondary {
    background: #262626;
  }
  .modal-cta.secondary:hover { background: #3a3a3a; }
  .modal-divider {
    border: none;
    border-top: 1px dashed #dbdbdb;
    margin: 16px 0;
  }
  .modal-subtext {
    font-size: 10.5px;
    color: #c7c7c7;
    margin-top: 6px;
  }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #262626;
    color: #fff;
    padding: 12px 20px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 2000;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

  <div class="modal">
    <div class="modal-icon">🥕</div>
    <div class="modal-title">여기서 바로 볼 수 있어요!</div>
    <p class="modal-desc">
      버튼 누르면 바로 이동돼요!<br>혹시 안 뜨면 검색창에 <strong>붙여넣기</strong> 해주세요<br>(키워드는 자동으로 복사돼요)
    </p>

    <div class="modal-set">
      <div class="modal-keyword-label">🧊 냉동 재료 한팩</div>
      <div class="modal-keyword-value">여성1</div>
      <button type="button" class="modal-cta" id="btn1">
        냉동이라 바로 갈기만 하면 끝 →
      </button>
    </div>

    <hr class="modal-divider">

    <div class="modal-set">
      <div class="modal-keyword-label">🥤 완제품</div>
      <div class="modal-keyword-value">여성2</div>
      <button type="button" class="modal-cta secondary" id="btn2">
        완제품 보러가기 →
      </button>
    </div>

    <p class="modal-subtext">쿠팡 파트너스 활동의 일환입니다</p>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    var COUPANG_URL = 'https://influencers.coupang.com/s/dkanrjsk';

    document.getElementById('btn1').addEventListener('click', function() {
      goWithKeyword(this, '여성1', '냉동 재료 한팩');
    });

    document.getElementById('btn2').addEventListener('click', function() {
      goWithKeyword(this, '여성2', '주스 완제품');
    });

    function goWithKeyword(btn, searchKeyword, copyText) {
      copyKeyword(copyText);
      btn.textContent = '키워드 복사하고 이동 중...';
      btn.style.opacity = '0.7';
      btn.style.pointerEvents = 'none';
      var encoded = encodeURIComponent(searchKeyword);
      setTimeout(function() {
        window.location.href = COUPANG_URL + '#:~:text=' + encoded;
      }, 800);
    }

    function copyKeyword(keyword) {
      if (navigator.clipboard) {
        navigator.clipboard.writeText(keyword).catch(function() { fallbackCopyKeyword(keyword); });
      } else {
        fallbackCopyKeyword(keyword);
      }
    }

    function fallbackCopyKeyword(text) {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); } catch (e) {}
      document.body.removeChild(ta);
    }
  </script>

</body>
</html>
